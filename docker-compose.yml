services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

  frontend:
    build:
      context: ./frontend

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.4
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

volumes:
  mysql_data: